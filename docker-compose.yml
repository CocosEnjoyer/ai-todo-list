version: "3.8"

services:
  backend:
    build: ./backend
    container_name: taskmanager_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/prisma

  frontend:
    build: ./frontend
    container_name: taskmanager_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  backend_data:
